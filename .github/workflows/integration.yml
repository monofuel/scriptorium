name: Integration Tests

on:
  workflow_dispatch:
  push:
    branches:
      - master

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CODEX_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: treeform/setup-nim-action@v6

      - name: Verify integration secrets
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "OPENAI_API_KEY secret is required for integration tests."
            exit 1
          fi

      - name: Install codex and claude CLIs
        run: npm install -g @openai/codex@0.116.0 @anthropic-ai/claude-code@2.1.80

      - name: Verify codex binary and features
        run: |
          which codex
          codex --version
          codex exec --help | sed -n '1,140p'
          codex exec --help | grep -q -- '--json'

      - name: Verify claude binary
        run: |
          which claude
          claude --version

      - name: Install system dependencies
        run: sudo apt-get install -y libpcre3-dev

      - name: Sync Nim dependencies
        run: nimby sync -g nimby.lock

      - name: Build and install typoi
        run: |
          NIMBY_PATHS=$(awk '{p=ENVIRON["HOME"] "/.nimby/pkgs/" $1; print "--path:" p "/src --path:" p}' nimby.lock | tr '\n' ' ')
          nim c -d:release $NIMBY_PATHS -o:$HOME/.nimby/bin/typoi ~/.nimby/pkgs/Typos/src/typoi.nim
          echo "$HOME/.nimby/bin" >> $GITHUB_PATH

      - name: Run integration tests
        run: make integration-test
