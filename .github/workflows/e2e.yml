name: End-To-End Tests

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  e2e:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CODEX_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: treeform/setup-nim-action@v6

      - name: Verify e2e secrets
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "OPENAI_API_KEY secret is required for e2e tests."
            exit 1
          fi

      - name: Install codex and claude CLIs
        run: npm install -g @openai/codex @anthropic-ai/claude-code

      - name: Verify codex binary and features
        run: |
          which codex
          codex --version
          codex exec --help | sed -n '1,140p'
          codex exec --help | grep -q -- '--json'

      - name: Verify claude binary
        run: |
          which claude
          claude --version

      - name: Sync Nim dependencies
        run: nimby sync -g nimby.lock

      - name: Run e2e tests
        run: make e2e-test

      - name: Upload e2e debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-debug-artifacts
          if-no-files-found: ignore
          path: |
            /tmp/scriptorium
            /tmp/scriptorium-plan-logs
